name: CI

on:
  pull_request:
    branches: [main, master]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Next 16 requires Node >=20.9; Hardhat also unsupported on 18
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # Pre-existing TypeScript errors prevent this from being a hard gate.
      # Known issues include: exactOptionalPropertyTypes violations, noUncheckedIndexedAccess
      # across many hooks/services, missing charting_library types (external vendor),
      # and noUnusedLocals in several files. Track progress in TECHNICAL_DEBT.md.
      # TODO: fix errors then remove continue-on-error.
      - name: Type check (non-blocking)
        run: npm run type-check
        continue-on-error: true

      - name: Unit tests
        run: npm run test:unit

      - name: Compile contracts
        run: npx hardhat compile

      - name: Contract tests
        run: npx hardhat test

      - name: Build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      # E2E: Start production server built in the previous step, wait for it,
      # then run Playwright against it. PLAYWRIGHT_BASE_URL suppresses the
      # playwright.config.ts webServer block (which would redundantly run dev).
      - name: Start production server for E2E
        run: npx next start &
        env:
          PORT: 3000

      - name: E2E tests
        run: npx wait-on http://localhost:3000 --timeout 60000 && npm run test:e2e
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
