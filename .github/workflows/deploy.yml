name: Vercel Deployment

# NOTE: The Vercel GitHub integration already deploys every push (see the
# vercel[bot] PR comments). This CLI-based workflow is only useful when a
# VERCEL_TOKEN secret is configured; without it, every step is skipped so
# the job reports success instead of a red X on every commit.

on:
  push:
    branches:
      - main
      - '**'  # Deploy all branches as preview
  pull_request:
    branches:
      - main

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Skip when Vercel token is not configured
        if: env.VERCEL_TOKEN == ''
        run: echo "VERCEL_TOKEN secret not configured — skipping CLI deploy. The Vercel GitHub integration handles deployments."

      - name: Checkout code
        if: env.VERCEL_TOKEN != ''
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: env.VERCEL_TOKEN != ''
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Vercel CLI
        if: env.VERCEL_TOKEN != ''
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment Information
        if: env.VERCEL_TOKEN != ''
        run: vercel pull --yes --environment=${{ github.ref == 'refs/heads/main' && 'production' || 'preview' }} --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project Artifacts
        if: env.VERCEL_TOKEN != ''
        run: vercel build ${{ github.ref == 'refs/heads/main' && '--prod' || '' }} --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        if: env.VERCEL_TOKEN != ''
        id: deploy
        run: |
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }} > deployment-url.txt
          else
            vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }} > deployment-url.txt
          fi
          echo "url=$(cat deployment-url.txt)" >> $GITHUB_OUTPUT

      - name: Comment Deployment URL on PR
        if: env.VERCEL_TOKEN != '' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const deploymentUrl = '${{ steps.deploy.outputs.url }}';
            const branch = '${{ github.head_ref }}';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 **Preview Deployment Ready**\n\n📦 Branch: \`${branch}\`\n🔗 URL: ${deploymentUrl}\n\n*Deployed via GitHub Actions*`
            })
